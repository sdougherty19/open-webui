apiVersion: apps/v1
kind: Deployment
metadata:
  name: AI-deployment
  namespace: AI
spec:
  replicas: 1
  selector:
    matchLabels:
      app: AI
  template:
    metadata:
      labels:
        app: AI
    spec:
      containers:
      - name: AI
        image: ghcr.io/open-webui/open-webui:main
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "500m"
            memory: "500Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        env:
        - name: OLLAMA_BASE_URL
          value: "http://ollama-service.open-webui.svc.cluster.local:11434"
        tty: true
        volumeMounts:
        - name: webui-volume
          mountPath: /app/backend/data
      volumes:
      - name: webui-volume
        persistentVolumeClaim:
          claimName: open-webui-pvc          
